<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ar-gr by Diego Capani</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #bottone-scatto {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; padding: 15px 25px; background: white; border-radius: 50px;
            border: 2px solid #000; font-weight: bold; cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <button id="bottone-scatto">SCATTA FOTO</button>

    <a-scene embedded 
             renderer="preserveDrawingBuffer: true;" 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="modello-1" src="man.glb"></a-asset-item>
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-entity gltf-model="#modello-1" scale="6 6 6" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.getElementById('bottone-scatto').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            const canvasAR = scene.canvas;

            // 1. Crea il foglio per la foto
            const fotoCanvas = document.createElement('canvas');
            fotoCanvas.width = canvasAR.width;
            fotoCanvas.height = canvasAR.height;
            const ctx = fotoCanvas.getContext('2d');

            // 2. Disegna la webcam
            ctx.drawImage(video, 0, 0, fotoCanvas.width, fotoCanvas.height);

            // --- IL TRUCCO MAGICO ---
            // Forza il motore grafico (renderer) a disegnare il soggetto ORA, 
            // altrimenti il buffer risulta vuoto durante la copia.
            scene.renderer.render(scene.object3D, scene.camera);

            // 3. Disegna il soggetto (A-Frame) sopra la webcam
            ctx.drawImage(canvasAR, 0, 0, fotoCanvas.width, fotoCanvas.height);

            // 4. Salva
            const link = document.createElement('a');
            link.download = "foto-ar.png";
            link.href = fotoCanvas.toDataURL("image/png");
            link.click();
        });
    </script>
</body>
</html>
