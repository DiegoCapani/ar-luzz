<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram - Visual Only</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Ottimizzazione video webcam */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded 
             vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3; 
                   debugUIEnabled: false; 
                   sourceWidth:1280; sourceHeight:720; 
                   displayWidth:1280; displayHeight:720;">

        <a-assets>
            <video id="ologrammaVideo" 
                   src="vd1-loop.mp4" 
                   preload="auto" 
                   loop="true" 
                   autoplay="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker type="barcode" value="2">
            
            <a-plane 
                src="#ologrammaVideo" 
                position="0 1 0" 
                rotation="0 90 0" 
                width="1.2" 
                height="2.1" 
                material="shader: flat; blending: additive; transparent: true; side: double; opacity: 1;">
            </a-plane>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Gestione Playback forzata
        window.addEventListener('load', function () {
            var video = document.querySelector('#ologrammaVideo');
            
            // Prova a far partire il video al caricamento
            video.play().catch(function(error) {
                console.log("Autoplay silenzioso in attesa...");
            });

            // Assicura che il video riparta se il marker viene perso e ritrovato
            var marker = document.querySelector('a-marker');
            marker.addEventListener('markerFound', function() {
                video.play();
            });
        });
    </script>

</body>
</html>
