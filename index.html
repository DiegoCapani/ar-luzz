<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Art - Deep Fix</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* Forza il corpo a non avere colori di sfondo che coprano la camera */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent !important;
        }

        /* Forza il video a stare sotto e a coprire tutto lo schermo */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            z-index: -1 !important;
        }

        /* Rende il canvas di A-Frame trasparente */
        .a-canvas {
            background-color: transparent !important;
        }

        #btn-foto {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.8);
            border-radius: 50%; border: 6px solid #fff; z-index: 10000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #btn-foto:active { background: #ff4444; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="btn-foto"></div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;"
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <img id="mio-png" src=".man1.png" crossorigin="anonymous">
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-image 
                src="#mio-png" 
                scale="10 10 10" 
                position="0 0.1 0" 
                rotation="0 90 0"
                material="transparent: true; alphaTest: 0.5; shader: flat;">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // FORZA IL VIDEO VISIBILE
        // Alcuni browser caricano il video con ritardo, questo script monitora l'inserimento
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.addedNodes.length) {
                    const video = document.querySelector('#arjs-video');
                    if (video) {
                        video.style.zIndex = "-1";
                        video.style.position = "absolute";
                        video.style.top = "0";
                        document.body.style.backgroundColor = "transparent";
                    }
                }
            });
        });

        observer.observe(document.body, { childList: true });

        // LOGICA SCATTO FOTO (Centrata)
        document.querySelector('#btn-foto').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            if (!video) return;

            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = video.videoWidth;
            finalCanvas.height = video.videoHeight;
            const ctx = finalCanvas.getContext('2d');

            // Disegna realtà
            ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height);

            // Disegna Virtuale (Centrato)
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const cWidth = scene.canvas.clientWidth;
            const cHeight = scene.canvas.clientHeight;
            const scale = Math.max(vWidth / cWidth, vHeight / cHeight);
            const xOffset = (vWidth - cWidth * scale) / 2;
            const yOffset = (vHeight - cHeight * scale) / 2;

            scene.renderer.render(scene.object3D, scene.camera);
            ctx.drawImage(scene.canvas, 0, 0, scene.canvas.width, scene.canvas.height, xOffset, yOffset, cWidth * scale, cHeight * scale);

            const link = document.createElement('a');
            link.download = `AR_Art_${Date.now()}.png`;
            link.href = finalCanvas.toDataURL('image/png').replace("image/png", "image/octet-stream");
            link.click();
        });
    </script>
</body>
</html>
