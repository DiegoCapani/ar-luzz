<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ar-gr by Diego Capani</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Pulsante basilare sopra la scena */
        #bottone-scatto {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 15px;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <button id="bottone-scatto">SCATTA FOTO</button>

    <a-scene embedded 
             renderer="preserveDrawingBuffer: true;" 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="modello-1" src="man.glb"></a-asset-item>
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-entity 
                gltf-model="#modello-1" 
                scale="3 3 3" 
                position="0 0 0" 
                rotation="0 90 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        document.getElementById('bottone-scatto').addEventListener('click', function() {
            // Prende il canvas della scena A-Frame
            var canvas = document.querySelector('canvas.a-canvas');
            
            // Converte il contenuto del canvas in un'immagine (formato base64)
            var dataURL = canvas.toDataURL("image/png");
            
            // Crea un link invisibile per forzare il download
            var link = document.createElement('a');
            link.download = "foto-ar.png";
            link.href = dataURL;
            link.click();
        });
    </script>

</body>
</html>
