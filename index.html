<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram - Fix Photo</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }

        #btn-foto {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; background: white;
            border-radius: 50%; border: 5px solid rgba(0,0,0,0.3);
            z-index: 9999; cursor: pointer;
        }
        #btn-foto:active { background: #ff0000; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="btn-foto"></div>

    <a-scene embedded 
             vr-mode-ui="enabled: false"
             renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;"
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <video id="ologrammaVideo" 
                   src="vd1-loop.mp4" 
                   preload="auto" loop="true" autoplay="true" muted="true" 
                   playsinline webkit-playsinline crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker type="barcode" value="2">
            <a-plane 
                id="target-plane"
                src="#ologrammaVideo" 
                position="0 1 0" 
                rotation="0 90 0" 
                width="1.2" height="2.1" 
                material="shader: flat; blending: additive; transparent: true; side: double;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const videoOlogramma = document.querySelector('#ologrammaVideo');
        const btnFoto = document.querySelector('#btn-foto');

        // Assicuriamoci che il video parta
        window.addEventListener('click', () => { videoOlogramma.play(); }, {once: true});

        btnFoto.addEventListener('click', function() {
            const sceneEl = document.querySelector('a-scene');
            const webcamVideo = document.querySelector('#arjs-video');
            
            // Creiamo il canvas per il merge
            const canvas = document.createElement('canvas');
            canvas.width = webcamVideo.clientWidth;
            canvas.height = webcamVideo.clientHeight;
            const ctx = canvas.getContext('2d');

            // 1. Disegna la webcam
            ctx.drawImage(webcamVideo, 0, 0, canvas.width, canvas.height);

            // 2. Disegna il contenuto di A-Frame (l'ologramma)
            // Usiamo direttamente il canvas della scena per assicurarci di vedere il video applicato
            ctx.drawImage(sceneEl.canvas, 0, 0, canvas.width, canvas.height);

            // 3. Salvataggio
            const link = document.createElement('a');
            link.download = 'installazione-ar-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
