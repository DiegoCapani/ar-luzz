<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>AR Selfie 9:16 - Diego Capani</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
#btn-scatto{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    border:5px solid #000;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}
#btn-scatto:active{background:#ff4444;}
</style>
</head>

<body style="margin:0; overflow:hidden;">

<div id="btn-scatto"></div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true; alpha:true; preserveDrawingBuffer:true;"
arjs="trackingMethod: best;
      sourceType: webcam;
      debugUIEnabled:false;">

<a-assets>
    <a-asset-item id="modello-1" src="luzzetti.glb"></a-asset-item>
</a-assets>

<!-- MARKER STABILE -->
<a-marker
type="barcode"
value="1"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5">

    <!-- CONTENITORE (IMPORTANTISSIMO) -->
    <a-entity id="anchor">

        <a-entity
            gltf-model="#modello-1"
            position="0 0 0"
            rotation="0 180 0"
            scale="1 1 1"
            animation-mixer>
        </a-entity>

    </a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

document.getElementById('btn-scatto').addEventListener('click', function(){

    const scene = document.querySelector('a-scene');
    const video = document.querySelector('#arjs-video');
    const canvasAR = scene.canvas;

    const outW = 1080;
    const outH = 1920;

    const fotoCanvas = document.createElement('canvas');
    fotoCanvas.width = outW;
    fotoCanvas.height = outH;
    const ctx = fotoCanvas.getContext('2d');

    const vW = video.videoWidth;
    const vH = video.videoHeight;

    const targetRatio = outW/outH;
    const videoRatio = vW/vH;

    let sx,sy,sw,sh;

    if(videoRatio>targetRatio){
        sw=vH*targetRatio;
        sh=vH;
        sx=(vW-sw)/2;
        sy=0;
    }else{
        sw=vW;
        sh=vW/targetRatio;
        sx=0;
        sy=(vH-sh)/2;
    }

    ctx.drawImage(video,sx,sy,sw,sh,0,0,outW,outH);

    const cW=canvasAR.width;
    const cH=canvasAR.height;
    const canvasRatio=cW/cH;

    let cx,cy,cw,ch;

    if(canvasRatio>targetRatio){
        cw=cH*targetRatio;
        ch=cH;
        cx=(cW-cw)/2;
        cy=0;
    }else{
        cw=cW;
        ch=cW/targetRatio;
        cx=0;
        cy=(cH-ch)/2;
    }

    scene.renderer.render(scene.object3D,scene.camera);

    ctx.drawImage(canvasAR,cx,cy,cw,ch,0,0,outW,outH);

    const link=document.createElement('a');
    link.download=`AR_916_Selfie_${Date.now()}.png`;
    link.href=fotoCanvas.toDataURL("image/png");
    link.click();
});
</script>

</body>
</html>
